<!DOCTYPE html>
<html>
<head>
    <title>GBuxBot</title>
    <script>
        // Fix to scroll to top on load and ensure the active page is displayed
        window.onload = function() {
            window.scrollTo(0, 0);
            // Assuming there's a logic to set the active page, e.g., displayActivePage();
        };

        // Function to load Telegram profile picture
        function loadTelegramProfilePic() {
            const profilePicElement = document.getElementById('profile-picture');
            const telegramUserId = 'your_telegram_user_id'; // Assume user ID is defined
            profilePicElement.src = `https://api.telegram.org/bot<your_bot_token>/getUserProfilePhotos?user_id=${telegramUserId}`;
        }

        // Carousel functionality for "Refer" and "Commission History"
        let currentIndex = 0;
        const items = document.querySelectorAll('.carousel-item');

        function showCurrentItem() {
            items.forEach((item, index) => {
                item.style.display = (index === currentIndex) ? 'block' : 'none';
            });
        }

        function nextItem() {
            currentIndex = (currentIndex + 1) % items.length;
            showCurrentItem();
        }

        function prevItem() {
            currentIndex = (currentIndex - 1 + items.length) % items.length;
            showCurrentItem();
        }
    </script>
</head>
<body onload="loadTelegramProfilePic()">
    <div id="profile-card">
        <img id="profile-picture" src="" alt="Profile Picture">
    </div>
    <div class="carousel">
        <button onclick="prevItem()">❮</button>
        <div class="carousel-item">Refer Content</div>
        <div class="carousel-item">Commission History Content</div>
        <button onclick="nextItem()">❯</button>
    </div>
</body>
</html>
